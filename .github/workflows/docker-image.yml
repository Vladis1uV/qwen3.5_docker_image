name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build ./api/ -t vladis1uv/vllm-qwen3.5:latest
    - name: push image to docker hub
      run: |
        docker login -u vladis1uv -p ${{ secrets.DOCKER_HUB_TOKEN }}
        docker push vladis1uv/vllm-qwen3.5:latest
